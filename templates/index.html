<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Churn Prediction</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
background: linear-gradient(135deg,#5f2c82,#49a09d);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

/* Main Card */

.container{
background:white;
padding:35px;
border-radius:15px;
width:100%;
max-width:650px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* Header */

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
color:#333;
margin-bottom:5px;
}

.header p{
color:#666;
font-size:14px;
}

/* Form Fields */

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
color:#444;
}

select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
transition:0.2s;
}

select:focus{
border-color:#5f2c82;
outline:none;
box-shadow:0 0 5px rgba(95,44,130,0.3);
}

/* Button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#5f2c82,#49a09d);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* Prediction Box */

.result{
margin-top:25px;
padding:15px;
border-radius:10px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.result.churn{
background:#ffe5e5;
color:#c0392b;
}

.result.no-churn{
background:#e7ffe5;
color:#27ae60;
}

</style>
</head>


<body>

<div class="container">

<div class="header">
<h1>Customer Churn Prediction</h1>
<p>Predict whether a customer is likely to leave the service</p>
</div>
{% if prediction %}

<div class="result {% if prediction == 'Churn' %}churn{% else %}no-churn{% endif %}">
Prediction Result: {{ prediction }}
</div>

{% endif %}

<form action="/predict" method="post">

{% for key, value in features.items() %}

<div class="form-group">
<label>{{key}}</label>

<select name="{{key}}">
{% for v in value %}
<option value="{{v}}">{{v}}</option>
{% endfor %}
</select>
</div>

{% endfor %}

<button type="submit">Predict Churn</button>

</form>



</div>

</body>
</html>
